<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Enter Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #f0f0f0;
      font-family: system-ui, sans-serif;
    }

    .page-content {
      padding: 60px;
      color: #ccc;
      font-size: 14px;
      line-height: 2;
    }

    /* ── Blob keyframes ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes blob {
      0%,100% { border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%; }
      33%      { border-radius: 40% 60% 45% 55% / 60% 40% 60% 40%; }
      66%      { border-radius: 55% 45% 60% 40% / 40% 55% 45% 60%; }
    }

    /* ── Entrance: scale from huge → normal, origin = bottom right ── */
    @keyframes shrink-in {
      0%   { transform: scale(6); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── The button ── */
    .btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: bottom right;
      animation: shrink-in 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .glow {
      position: absolute; inset: -10px;
      background: conic-gradient(from 0deg, #ff4e6e, #ff9b2e, #ffe135, #4fffb0, #4dc8ff, #a259ff, #ff4e6e);
      animation: spin 5s linear infinite, blob 5s ease-in-out infinite;
      filter: blur(14px); opacity: 0.85;
    }
    .glow2 {
      position: absolute; inset: -4px;
      background: conic-gradient(from 180deg, #a259ff, #4dc8ff, #4fffb0, #ffe135, #ff9b2e, #ff4e6e, #a259ff);
      animation: spin 3s linear infinite reverse, blob 4s ease-in-out infinite reverse;
      filter: blur(6px); opacity: 0.7;
    }
    .spark {
      position: relative; z-index: 1;
      font-size: 22px; color: white;
      text-shadow: 0 0 12px rgba(0,0,0,0.4);
    }

    .replay {
      position: fixed;
      bottom: 90px;
      right: 24px;
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      border: 1px solid #ddd;
      padding: 4px 12px;
      border-radius: 20px;
      background: white;
    }
    .replay:hover { color: #555; }
  </style>
</head>
<body>

  <div class="page-content">
    This is a demo page.<br>
    Watch the bottom right corner when it loads.<br>
    Click "replay" to see again.
  </div>

  <button class="btn" id="btn">
    <span class="glow"></span>
    <span class="glow2"></span>
    <span class="spark">✦</span>
  </button>

  <div class="replay" onclick="replay()">replay</div>

  <script>
    function replay() {
      const el = document.getElementById('btn');
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    }
  </script>
</body>
</html>
